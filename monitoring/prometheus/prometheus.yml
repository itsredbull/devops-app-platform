global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/uptime-rules.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: uptime-api
    metrics_path: /metrics
    static_configs:
      - targets: ["uptime-api:8080"]
        labels:
          env: local
