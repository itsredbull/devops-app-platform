name: image-release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (example: v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  release-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-app-platform:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/devops-app-platform:latest
