apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: uptime-platform
  namespace: argocd
spec:
  description: Uptime platform GitOps project
  sourceRepos:
    - https://github.com/itsredbull/devops-app-platform.git
  destinations:
    - namespace: uptime-dev
      server: https://kubernetes.default.svc
    - namespace: uptime-staging
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
