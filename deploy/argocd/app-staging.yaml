apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/itsredbull/devops-app-platform.git
    targetRevision: main
    path: deploy/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
