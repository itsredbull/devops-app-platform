apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uptime-dev

resources:
  - ../../base

configMapGenerator:
  - name: uptime-app-config
    literals:
      - APP_ENV=dev
      - APP_PORT=8080
      - LOG_LEVEL=debug
      - DB_HOST=uptime-postgres
      - DB_PORT=5432
      - DB_NAME=uptime
      - DB_SSLMODE=disable
      - AUTO_MIGRATE=true
      - MIGRATIONS_DIR=/migrations
      - SCHEDULER_TICK_SECONDS=5
      - CHECK_MAX_ATTEMPTS=3
      - CHECK_RETRY_BACKOFF_MS=200
  - name: postgres-config
    literals:
      - POSTGRES_DB=uptime

secretGenerator:
  - name: uptime-app-secret
    envs:
      - secret.env
  - name: postgres-secret
    envs:
      - secret.env

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: uptime-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
