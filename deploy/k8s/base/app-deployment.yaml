apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-api
  labels:
    app.kubernetes.io/name: uptime-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-api
    spec:
      containers:
        - name: uptime-api
          image: ghcr.io/itsredbull/devops-app-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: uptime-app-config
            - secretRef:
                name: uptime-app-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
